version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: crisismap-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: crisismap2024
      MONGO_INITDB_DATABASE: crisismap
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - crisismap-network

  # Redis for Caching
  redis:
    image: redis:7.2-alpine
    container_name: crisismap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crisismap-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: crisismap-backend
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://admin:crisismap2024@mongodb:27017/crisismap?authSource=admin
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
    depends_on:
      - mongodb
      - redis
    networks:
      - crisismap-network

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: crisismap-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./next-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - crisismap-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: crisismap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - crisismap-network

volumes:
  mongodb_data:
  redis_data:

networks:
  crisismap-network:
    driver: bridge